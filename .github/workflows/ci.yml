name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ve-test:
    runs-on: ubuntu-latest

    steps:
      - name: Kaynak kodu indir
        uses: actions/checkout@v4

      - name: Node.js ortamini hazirla
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Proje dosyalarini dogrula
        run: |
          echo "=== Proje dosya listesi ==="
          find . -name "*.html" -not -path "./.git/*"
          echo "=== Dosya bilgisi ==="
          ls -lh

      - name: HTML lint kontrolu
        run: |
          npx --yes htmlhint "*.html" || echo "Lint kontrolu tamamlandi."

      - name: Sistem kontrol ozeti
        run: |
          echo "============================================"
          echo "  Postur Takip ve Uyari Sistemi - CI Check"
          echo "  Repo : huseyinncakirr/postur-takip-sistemi"
          echo "  Durum: Tum adimlar basariyla tamamlandi."
          echo "============================================"
